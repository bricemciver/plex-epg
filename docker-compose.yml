# docker-compose.yml
#
# Example compose config for the OTA-aware EPG image.
# Adjust ZIP_CODE, PLEX_URL, PLEX_TOKEN, and TZ, then run:
#   docker compose up -d

services:
  epg:
    build: .
    image: epg-ota
    container_name: epg-ota
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # EPG output (channels.xml is written here; guide.xml will also appear here)
      - ./data:/epg/public
    environment:
      # ── OTA extension settings ──────────────────────────────────────────
      ZIP_CODE: "90210"                        # Set your zip code here
      PLEX_URL: "http://192.168.1.10:32400"    # Your local Plex server URL
      PLEX_TOKEN: "your-plex-token-here"       # Your X-Plex-Token
      OTA_LANG: "en"                           # Fallback language

      # ── Original upstream settings ──────────────────────────────────────
      TZ: "America/Los_Angeles"    # Set your local timezone
      CRON_SCHEDULE: "0 3 * * *"  # Refresh guide daily at 3am
      MAX_CONNECTIONS: "5"
      GZIP: "false"
      DAYS: "7"
